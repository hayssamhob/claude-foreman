name: Validate Recipes

on:
  pull_request:
    paths:
      - 'recipes/**'
      - 'scripts/validate-recipes.ts'
  push:
    branches:
      - main
    paths:
      - 'recipes/**'
      - 'scripts/validate-recipes.ts'

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      
      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 20
          
      - name: Install dependencies
        run: npm ci
        
      - name: Validate recipes
        run: npx tsx scripts/validate-recipes.ts
