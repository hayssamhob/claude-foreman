name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-test:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    # Windows fails on better-sqlite3 (needs Visual Studio build tools) — known false
    # negative, see AGENTS.md. Keep it in the matrix for signal but don't let it block.
    continue-on-error: ${{ matrix.os == 'windows-latest' }}

    steps:
      - uses: actions/checkout@v7

      - name: Set up Node
        uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Test
        run: npm test

  secret-scan:
    runs-on: ubuntu-latest
    # Scan the PR diff for planted credentials before merge. Zero LLM cost — pure regex
    # via src/guard/secretscan.ts. Blocks the PR if any secret pattern is found.
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Set up Node
        uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Scan diff for secrets
        env:
          BASE_SHA: ${{ github.event.pull_request.base.sha || github.sha }}
        run: npx tsx scripts/secret-scan.ts
