name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-test:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    # We now configure MSVC and Python explicitly for Windows to prevent better-sqlite3 build failures.

    steps:
      - uses: actions/checkout@v4

      - name: Setup Python (for node-gyp on Windows)
        if: matrix.os == 'windows-latest'
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Enable MSVC on Windows
        if: matrix.os == 'windows-latest'
        uses: ilammy/msvc-dev-cmd@v1

      - name: Set up Node
        uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Test
        run: npm test

  secret-scan:
    runs-on: ubuntu-latest
    # Scan the PR diff for planted credentials before merge. Zero LLM cost — pure regex
    # via src/guard/secretscan.ts. Blocks the PR if any secret pattern is found.
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Node
        uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Scan diff for secrets
        env:
          BASE_SHA: ${{ github.event.pull_request.base.sha || github.sha }}
        run: npx tsx scripts/secret-scan.ts
