version: 2
updates:
  # npm dependencies — TypeScript spine
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
    labels:
      - type:infra
      - spine:harden
    commit-message:
      prefix: "chore(deps)"

  # GitHub Actions versions
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
    labels:
      - type:infra
      - spine:harden
    commit-message:
      prefix: "chore(ci)"
